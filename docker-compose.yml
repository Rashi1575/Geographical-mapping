# docker-compose.yml
# ──────────────────────────────────────────────────────────────────────
# Brings up the entire Hospital GIS project locally.
#
# Services:
#   db          — PostgreSQL + PostGIS (backend's database)
#   backend     — FastAPI backend (Tanya/Lakshita/Prashant)
#   realtime    — WebSocket realtime server (Daksh/Riya/Sourav)
#   signaling   — WebRTC signaling server   (Daksh/Riya/Sourav)
#   frontend    — React frontend (Rashi)
#
# Usage:
#   docker-compose up --build
#
# Then open:
#   Frontend:       http://localhost:3000
#   Backend API:    http://localhost:8000/docs
#   Realtime WS:    ws://localhost:8001/ws/all
#   Signaling:      http://localhost:3001/health
#   PgAdmin:        http://localhost:5050 (optional)
# ──────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ── PostgreSQL + PostGIS ─────────────────────────────────────────────
  db:
    image: postgis/postgis:15-3.3
    container_name: gis_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       gis_health
      POSTGRES_USER:     gis_user
      POSTGRES_PASSWORD: gis_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gis_user -d gis_health"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Backend (FastAPI) ────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend          # Tanya's backend folder
      dockerfile: Dockerfile
    container_name: gis_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://gis_user:gis_password@db:5432/gis_health
      REALTIME_URL: http://realtime:8001
    depends_on:
      db:
        condition: service_healthy

  # ── Realtime server (your module) ───────────────────────────────────
  realtime:
    build:
      context:    ./realtime-server
      dockerfile: Dockerfile
    container_name: gis_realtime
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      BACKEND_URL:  http://backend:8000
      PORT:         8001
    depends_on:
      - backend

  # ── Signaling server (your module) ──────────────────────────────────
  signaling:
    build:
      context:    ./telemedicine/signaling
      dockerfile: Dockerfile
    container_name: gis_signaling
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001

  # ── Frontend (React) ─────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend         # Rashi's frontend folder
      dockerfile: Dockerfile
    container_name: gis_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      REACT_APP_BACKEND_URL:        http://localhost:8000
      REACT_APP_REALTIME_WS_URL:    ws://localhost:8001
      REACT_APP_SIGNALING_URL:      http://localhost:3001
    depends_on:
      - backend
      - realtime
      - signaling

volumes:
  pgdata:
