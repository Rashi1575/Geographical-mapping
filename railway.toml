# railway.toml — for deploying realtime server to Railway.app
# ──────────────────────────────────────────────────────────────────────
# Deploy steps:
#   1. Go to https://railway.app → New Project → Deploy from GitHub
#   2. Select this repo and point the root to /realtime-server
#   3. Railway auto-detects this config file
#
# Set these environment variables in Railway dashboard:
#   BACKEND_URL → your backend Railway URL (e.g. https://gis-backend.up.railway.app)
# ──────────────────────────────────────────────────────────────────────

[build]
builder    = "NIXPACKS"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand  = "uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[services]]
name = "gis-realtime"
